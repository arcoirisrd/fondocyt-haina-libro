    - anexos/N-urblex-ai.qmd

bibliography: references.bib
csl: apa.csl
lang: es
number-sections: true
number-depth: 4
link-citations: true
link-bibliography: true

crossref:
  fig-title: "Figura"
  tbl-title: "Tabla"
  fig-prefix: "Fig."
  tbl-prefix: "Tabla"
  chapters: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    grid:
      sidebar-width: 320px
      body-width: 900px
      margin-width: 250px
