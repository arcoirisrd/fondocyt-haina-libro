        - 03-territorio.qmd
        - 04-planificacion-urbana.qmd
        - 05-gestion-riesgos.qmd
        - 06-participacion-diagnostico.qmd

    - part: "Parte III. Herramientas digitales (OE2)"
      chapters:
        - 07-sistema-digital.qmd

    - part: "Parte IV. Gobernanza y normativa (OE3)"
      chapters:
        - 08-normativa-tipologias.qmd
        - 09-participacion-observatorio.qmd
        - 10-actividades-normativa.qmd

    - part: "Parte V. Transferencia y validación"
      chapters:
